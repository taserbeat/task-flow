<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
<defs>
  <linearGradient id="tGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#3FA9F5"/>
    <stop offset="100%" stop-color="#0D47A1"/>
  </linearGradient>
  <linearGradient id="fGrad" x1="0" y1="1" x2="1" y2="0">
    <stop offset="0%" stop-color="#00C853"/>
    <stop offset="100%" stop-color="#B2FF59"/>
  </linearGradient>
  <linearGradient id="checkGrad" x1="0" y1="1" x2="1" y2="0">
    <stop offset="0%" stop-color="#00897B"/>
    <stop offset="100%" stop-color="#69F0AE"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
  </filter>
</defs>

<rect x="8" y="8" width="240" height="240" rx="40" fill="none" stroke="#90A4AE" stroke-width="2"/>

<!-- T -->
<path d="M60 70 H196 Q210 70 200 90 H140 V200 L110 190 V90 H60 Z"
      fill="url(#tGrad)"/>

<!-- F -->
<path d="M140 100 H190 L150 140 H180 V170 H140 Z"
      fill="url(#fGrad)"/>

<!-- Check -->
<path d="M90 150 L120 180 L200 90"
      fill="none"
      stroke="url(#checkGrad)"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#shadow)"/>
</svg>
